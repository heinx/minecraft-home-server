name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tarball: ${{ steps.package.outputs.tarball }}
      attested: ${{ steps.attest.outcome == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package tarball
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          scripts/package.sh "$VERSION"
          TARBALL="minecraft-home-server-${VERSION}.tar.gz"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        id: attest
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.package.outputs.tarball }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARBALL="${{ steps.package.outputs.tarball }}"
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "${TARBALL}" \
            "${TARBALL}.sha256"

  verify-attestation:
    needs: release
    if: needs.release.outputs.attested == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARBALL="${{ needs.release.outputs.tarball }}"
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "${TARBALL}" \
            --pattern "${TARBALL}.sha256"

      - name: Verify checksum
        run: sha256sum -c "${{ needs.release.outputs.tarball }}.sha256"

      - name: Verify build attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh attestation verify "${{ needs.release.outputs.tarball }}" \
            --repo "${{ github.repository }}"
