name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package tarball
        run: |
          mkdir minecraft-home-server
          cp -r scripts/ templates/ install.sh config.env.example LICENSE minecraft-home-server/
          tar -czf minecraft-home-server.tar.gz minecraft-home-server/

      - name: Generate checksum
        run: sha256sum minecraft-home-server.tar.gz > minecraft-home-server.tar.gz.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: minecraft-home-server.tar.gz

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            minecraft-home-server.tar.gz \
            minecraft-home-server.tar.gz.sha256
