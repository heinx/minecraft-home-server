name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl unzip screen jq zip

      - name: Run test suite
        run: sudo tests/run_tests.sh

      - name: Run package tests
        run: sudo tests/test_package.sh
